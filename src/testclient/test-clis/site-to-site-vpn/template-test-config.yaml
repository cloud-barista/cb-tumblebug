tumblebug:
  # Tumblebug API endpoint
  endpoint: http://localhost:1323
  
  # Namespace and Infra IDs
  demo:
    nsId: default
    infraId: infra01
  
  # Infra Dynamics request body template (JSON)
  api:
    infraDynamic:
      reqBody: infraDynamic.json

# Site-to-site VPN test cases
# Copy this file to test-config.yaml and modify the test cases as needed.
# Set 'execute: true' for the test cases you want to run.
testTargetPairs:
  testCases:
    - site1: aws
      site2: gcp
      vpnId: vpn-aws-gcp
      execute: false
    - site1: aws
      site2: alibaba
      vpnId: vpn-aws-alibaba
      execute: false
    - site1: aws
      site2: tencent
      vpnId: vpn-aws-tencent
      execute: false
    - site1: aws
      site2: ibm
      vpnId: vpn-aws-ibm
      execute: false
    - site1: aws
      site2: azure
      vpnId: vpn-aws-azure
      execute: false
    - site1: aws
      site2: openstack
      vpnId: vpn-aws-openstack
      execute: false
