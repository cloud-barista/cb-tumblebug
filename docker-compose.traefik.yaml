  #     - traefik.http.routers.mc-terrarium.rule=Host(`mc-terrarium.localhost`)
  #     - traefik.http.routers.mc-terrarium.entrypoints=web,websecure
  #     - traefik.http.routers.mc-terrarium.tls=true
  #     - traefik.http.services.mc-terrarium.loadbalancer.server.scheme=http
